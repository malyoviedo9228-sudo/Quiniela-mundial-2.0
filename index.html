<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Fase Final · Mundial 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --verde:#006837; --verde-dk:#004d29; --verde-lt:#e6f4ec;
  --rojo:#CC0000;  --rojo-lt:#fff0f0;
  --oro:#FFD700;   --oro-dk:#b39700;
  --negro:#111;    --blanco:#fff;
  --gris:#f3f4f0;  --borde:#dde0d8; --txt2:#5a6352;
  --fd:'Bebas Neue',sans-serif; --fb:'Inter',sans-serif;
  --r:8px; --rl:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--gris);color:var(--negro);min-height:100vh}

/* ── HEADER ── */
.hdr{background:var(--verde-dk);border-bottom:3px solid var(--oro);padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;min-height:62px}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-title{font-family:var(--fd);font-size:24px;color:var(--oro);letter-spacing:1px;line-height:1}
.hdr-sub{font-size:11px;color:#8eba9e;margin-top:2px}
.nav{display:flex;gap:4px;padding:8px 0;flex-wrap:wrap}
.nb{padding:7px 15px;border-radius:6px;border:1.5px solid transparent;background:transparent;color:#8eba9e;font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.nb:hover{color:#fff;border-color:rgba(255,255,255,.2)}
.nb.active{background:var(--oro);color:var(--verde-dk);border-color:var(--oro);font-weight:700}

/* ── HERO ── */
.hero{background:var(--verde);padding:12px 20px;display:flex;align-items:center;justify-content:center;gap:28px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.1)}
.hs{text-align:center}
.hs-n{font-family:var(--fd);font-size:30px;color:var(--oro);line-height:1}
.hs-l{font-size:10px;color:#a8d4b8;text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.hdiv{width:1px;height:34px;background:rgba(255,255,255,.18)}

/* ── MAIN ── */
.main{max-width:1100px;margin:0 auto;padding:18px 14px 50px}

/* ── CARDS ── */
.card{background:var(--blanco);border:1px solid var(--borde);border-radius:var(--rl);overflow:hidden;margin-bottom:16px}
.card-hdr{background:var(--verde-dk);color:var(--oro);padding:11px 18px;font-family:var(--fd);font-size:17px;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center}
.card-hdr small{font-family:var(--fb);font-size:11px;color:#8eba9e;font-weight:400}
.card-body{padding:16px 18px}

/* ── BUTTONS ── */
.btn{padding:9px 18px;border:none;border-radius:var(--r);font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn:disabled{opacity:.55;cursor:not-allowed}
.btn-primary{background:var(--verde);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--verde-dk)}
.btn-gold{background:var(--oro);color:var(--verde-dk)}
.btn-gold:hover:not(:disabled){background:#e6c300}
.btn-outline{background:transparent;border:1.5px solid var(--borde);color:var(--txt2)}
.btn-outline:hover:not(:disabled){border-color:var(--verde);color:var(--verde)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-danger{background:var(--rojo);color:#fff}

/* ── INFO BOXES ── */
.info{background:var(--verde-lt);border:1px solid #b3d9c2;border-radius:var(--r);padding:10px 15px;font-size:13px;color:var(--verde-dk);margin-bottom:14px;line-height:1.5}
.warn{background:#fffbea;border:1px solid var(--oro-dk);border-radius:var(--r);padding:10px 15px;font-size:13px;color:#6b4c00;margin-bottom:14px}
.err{background:var(--rojo-lt);border:1px solid #f5c0c0;border-radius:var(--r);padding:10px 15px;font-size:13px;color:var(--rojo);margin-bottom:10px}

/* ── ROUND TABS ── */
.round-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.rt{padding:6px 14px;border:1.5px solid var(--borde);border-radius:6px;background:var(--blanco);color:var(--txt2);font-weight:600;font-size:13px;cursor:pointer;font-family:var(--fb);transition:all .12s;display:flex;flex-direction:column;align-items:center;gap:2px}
.rt:hover{border-color:var(--verde);color:var(--verde)}
.rt.active{background:var(--verde-dk);border-color:var(--verde-dk);color:var(--oro)}
.rt.done{background:var(--verde-lt);border-color:var(--verde);color:var(--verde-dk)}
.rt-sub{font-size:10px;font-weight:400;opacity:.8}
.rt-pts{font-size:10px;font-weight:700;color:var(--rojo);opacity:1}

/* ── MATCH CARD ── */
.matches-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.match{background:var(--gris);border:1.5px solid var(--borde);border-radius:var(--rl);overflow:hidden;transition:border-color .15s}
.match:hover{border-color:#b3d9c2}
.match.correct{border-color:var(--verde);background:var(--verde-lt)}
.match.partial{border-color:var(--oro-dk);background:#fffbea}
.match.wrong{border-color:#f5c0c0;background:var(--rojo-lt)}
.match-hdr{background:var(--verde-dk);color:#8eba9e;font-size:10px;padding:5px 12px;display:flex;justify-content:space-between;align-items:center;font-weight:500;text-transform:uppercase;letter-spacing:.6px}
.match-hdr .pts-badge{color:var(--oro);font-weight:700}
.match-body{padding:12px}
.teams-row{display:flex;align-items:center;gap:8px}
.team-name{flex:1;font-weight:600;font-size:14px;text-align:center;padding:6px 4px;border-radius:6px;transition:background .1s;min-height:36px;display:flex;align-items:center;justify-content:center;cursor:default}
.team-name.winner{background:var(--verde);color:#fff}
.team-name.loser{opacity:.5}
.vs{font-family:var(--fd);font-size:16px;color:var(--txt2);flex-shrink:0}
.score-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.score-input{flex:1;text-align:center;padding:8px 4px;border:1.5px solid var(--borde);border-radius:var(--r);font-family:var(--fd);font-size:22px;color:var(--negro);background:var(--blanco);width:100%;transition:border-color .15s;-moz-appearance:textfield}
.score-input::-webkit-outer-spin-button,.score-input::-webkit-inner-spin-button{-webkit-appearance:none}
.score-input:focus{outline:none;border-color:var(--verde)}
.score-input:disabled{background:var(--gris);color:var(--txt2);cursor:not-allowed}
.score-sep{font-family:var(--fd);font-size:20px;color:var(--txt2);flex-shrink:0}
.match-result-badge{margin-top:8px;text-align:center;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.match-result-badge.exact{background:var(--verde);color:#fff}
.match-result-badge.winner-ok{background:var(--oro-dk);color:#fff}
.match-result-badge.miss{background:var(--rojo);color:#fff}

/* ── BRACKET VIEW ── */
.bracket-wrap{overflow-x:auto;padding-bottom:12px}
.bracket{display:flex;gap:0;min-width:900px}
.bracket-col{display:flex;flex-direction:column;flex:1}
.bracket-col-hdr{background:var(--verde-dk);color:var(--oro);font-family:var(--fd);font-size:14px;letter-spacing:.5px;padding:7px 10px;text-align:center;border-right:1px solid rgba(255,255,255,.1)}
.bracket-col-hdr small{display:block;font-family:var(--fb);font-size:10px;color:#8eba9e;font-weight:400;margin-top:1px}
.bracket-slots{display:flex;flex-direction:column;flex:1;padding:8px 4px;gap:0}
.bslot{flex:1;display:flex;align-items:center;justify-content:center;padding:4px 2px;position:relative}
.bmatch{width:100%;background:var(--blanco);border:1.5px solid var(--borde);border-radius:8px;overflow:hidden;font-size:12px}
.bmatch-team{padding:5px 8px;font-weight:500;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--borde)}
.bmatch-team:last-child{border-bottom:none}
.bmatch-team.winner{background:var(--verde);color:#fff;font-weight:700}
.bmatch-team.tbd{color:#aaa;font-style:italic}
.bmatch-score{font-family:var(--fd);font-size:14px;color:var(--txt2);flex-shrink:0;margin-left:6px}
.bmatch-score.winner{color:var(--oro)}

/* ── RANKING ── */
.rank-row{display:flex;align-items:center;padding:13px 18px;border-top:1px solid var(--borde)}
.rank-row:first-child{border-top:none}
.rank-row.gold{background:#fffbea}
.rmed{font-size:22px;margin-right:12px;min-width:32px}
.rname{font-weight:600;font-size:14px}
.rsub{font-size:11px;color:var(--txt2);margin-top:2px}
.rpts{font-family:var(--fd);font-size:28px;color:var(--rojo);text-align:right;line-height:1}
.rpts-l{font-size:10px;color:var(--txt2);text-align:right}

/* ── ADMIN TABLE ── */
.ptable{width:100%;border-collapse:collapse;font-size:13px}
.ptable th{padding:7px 12px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2);border-bottom:1px solid var(--borde)}
.ptable td{padding:9px 12px;border-bottom:1px solid var(--borde);vertical-align:middle}
.ptable tr:last-child td{border-bottom:none}
.lpill{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.lpill.locked{background:#fff3cd;color:#6b4c00}
.lpill.open{background:var(--verde-lt);color:var(--verde-dk)}

/* ── ADMIN MATCH RESULTS ── */
.admin-matches{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.am{background:var(--blanco);border:1px solid var(--borde);border-radius:var(--rl);overflow:hidden}
.am-hdr{background:var(--verde-dk);color:var(--oro);padding:7px 13px;font-size:12px;font-weight:600;display:flex;justify-content:space-between}
.am-hdr span{color:#8eba9e;font-weight:400}
.am-body{padding:10px 13px}
.am-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.am-row:last-child{margin-bottom:0}
.am-team{flex:1;font-size:13px;font-weight:500;text-align:center}
.am-input{width:48px;text-align:center;padding:6px 4px;border:1.5px solid var(--borde);border-radius:6px;font-family:var(--fd);font-size:18px;-moz-appearance:textfield}
.am-input::-webkit-outer-spin-button,.am-input::-webkit-inner-spin-button{-webkit-appearance:none}
.am-input:focus{outline:none;border-color:var(--verde)}
.am-sep{font-family:var(--fd);font-size:16px;color:var(--txt2)}

/* ── LOGIN ── */
.login-wrap{max-width:360px;margin:60px auto;background:var(--blanco);border:1px solid var(--borde);border-radius:var(--rl);overflow:hidden}
.login-hdr{background:var(--verde-dk);padding:20px;text-align:center;border-bottom:3px solid var(--oro)}
.login-hdr h2{font-family:var(--fd);font-size:24px;color:var(--oro);letter-spacing:1px}
.login-hdr p{font-size:11px;color:#8eba9e;margin-top:3px}
.login-body{padding:22px;display:flex;flex-direction:column;gap:10px}
.login-body input{padding:10px 13px;border:1.5px solid var(--borde);border-radius:var(--r);font-family:var(--fb);font-size:14px;background:var(--gris);color:var(--negro)}
.login-body input:focus{outline:none;border-color:var(--verde)}

/* ── SETUP ── */
.setup-wrap{max-width:580px;margin:0 auto}
.step{display:flex;gap:13px;margin-bottom:14px;align-items:flex-start}
.step-n{min-width:26px;height:26px;border-radius:50%;background:var(--verde);color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
pre.code{background:#1a1a2e;border-radius:var(--r);padding:12px;font-size:11px;color:#a8d4b8;font-family:monospace;white-space:pre-wrap;overflow-x:auto;max-height:260px;overflow-y:auto}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;right:22px;background:var(--verde-dk);color:#fff;padding:11px 18px;border-radius:var(--r);border-left:4px solid var(--oro);font-size:13px;font-weight:500;z-index:1000;animation:sIn .22s ease;max-width:300px}
.toast.error{background:var(--rojo);border-left-color:#fff}
@keyframes sIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── LOADING ── */
.loading{text-align:center;padding:40px;color:var(--txt2);font-size:14px}
.spin{width:30px;height:30px;border:3px solid var(--borde);border-top-color:var(--verde);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 10px}
@keyframes sp{to{transform:rotate(360deg)}}

.footer-note{font-size:11px;color:var(--txt2);padding:9px 18px;border-top:1px solid var(--borde);background:var(--gris)}

/* ── POINTS LEGEND ── */
.pts-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.pl-item{background:var(--blanco);border:1px solid var(--borde);border-radius:6px;padding:6px 12px;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:2px}
.pl-item .pl-n{font-family:var(--fd);font-size:18px;color:var(--rojo);line-height:1}
.pl-item .pl-l{color:var(--txt2);font-size:10px;text-align:center}

/* ── AWARDS ── */
.awards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.award-card{background:var(--blanco);border:1.5px solid var(--borde);border-radius:var(--rl);overflow:hidden;transition:border-color .15s}
.award-card:hover{border-color:var(--oro-dk)}
.award-card.correct{border-color:var(--verde);background:var(--verde-lt)}
.award-card.wrong{border-color:#f5c0c0;background:var(--rojo-lt)}
.award-hdr{padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--borde)}
.award-icon{font-size:24px;flex-shrink:0}
.award-title{font-weight:700;font-size:14px;color:var(--negro);line-height:1.2}
.award-pts{font-family:var(--fd);font-size:20px;color:var(--rojo);margin-left:auto;flex-shrink:0}
.award-pts-lbl{font-size:9px;color:var(--txt2);text-align:right;line-height:1}
.award-body{padding:12px 14px}
.award-input{width:100%;padding:9px 13px;border:1.5px solid var(--borde);border-radius:var(--r);font-family:var(--fb);font-size:14px;background:var(--gris);color:var(--negro);transition:border-color .15s}
.award-input:focus{outline:none;border-color:var(--oro-dk)}
.award-input:disabled{opacity:.6;cursor:not-allowed}
.award-result{margin-top:8px;font-size:12px;padding:4px 10px;border-radius:20px;font-weight:600;text-align:center}
.award-result.hit{background:var(--verde);color:#fff}
.award-result.miss{background:var(--rojo);color:#fff}
@media(max-width:500px){.hdr-title{font-size:19px}.hero{gap:14px}.hs-n{font-size:24px}.matches-grid{grid-template-columns:1fr}.awards-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">
    <span style="font-size:26px">🏆</span>
    <div>
      <div class="hdr-title">Quiniela Fase Final 2026</div>
      <div class="hdr-sub">Dieciseisavos → Final · Predice marcadores</div>
    </div>
  </div>
  <nav class="nav">
    <button class="nb active" onclick="setView('picks')">Mis picks</button>
    <button class="nb" onclick="setView('premios')">🏅 Premios</button>
    <button class="nb" onclick="setView('bracket')">Bracket</button>
    <button class="nb" onclick="setView('admin')">Admin</button>
  </nav>
</header>

<div class="hero">
  <div class="hs"><div class="hs-n">32</div><div class="hs-l">Equipos</div></div>
  <div class="hdiv"></div>
  <div class="hs"><div class="hs-n">5</div><div class="hs-l">Rondas</div></div>
  <div class="hdiv"></div>
  <div class="hs"><div class="hs-n" id="hero-p">—</div><div class="hs-l">Participantes</div></div>
  <div class="hdiv"></div>
  <div class="hs"><div class="hs-n" id="hero-pts">—</div><div class="hs-l">Pts máx.</div></div>
</div>

<main class="main" id="app">
  <div class="loading"><div class="spin"></div>Cargando...</div>
</main>

<script>
// ── CONFIG ────────────────────────────────────────────────────
let SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxKMKMBI6lSHs8gOs319OuCHlRzNPHJgZik2Gme8JZSahpAMkTXdUaOJTC_32fpF4sR/exec';
localStorage.setItem('scriptUrl2', SCRIPT_URL);
const ADMIN_PASS = 'mundial2026';

// ── AWARDS ────────────────────────────────────────────────────
const AWARDS = [
  { id:'balon_oro',   icon:'🏆', label:'Balón de Oro',         desc:'Mejor jugador del torneo', pts:5 },
  { id:'bota_oro',    icon:'👟', label:'Bota de Oro',           desc:'Máximo goleador',          pts:4 },
  { id:'guante_oro',  icon:'🧤', label:'Guante de Oro',         desc:'Mejor portero',            pts:3 },
  { id:'mejor_joven', icon:'⭐', label:'Mejor Jugador Joven',   desc:'Sub-21 del torneo',        pts:3 },
  { id:'mejor_dt',    icon:'👔', label:'Mejor Director Técnico',desc:'Mejor entrenador',         pts:3 },
  { id:'fair_play',   icon:'🤝', label:'Premio Fair Play',      desc:'Equipo más deportivo',     pts:2 },
];

const MAX_AWARD_PTS = AWARDS.reduce((s,a)=>s+a.pts,0);

// ── ROUNDS & MATCHES ──────────────────────────────────────────
// Each match: { id, round, slot, home, away }
// Teams start as "TBD — Grupo X 1°" until admin sets them
const ROUNDS = [
  { id:'R16', label:'Dieciseisavos', short:'1/16', multiplier:1 },
  { id:'QF',  label:'Octavos',       short:'1/8',  multiplier:2 },
  { id:'SF',  label:'Cuartos',       short:'1/4',  multiplier:4 },
  { id:'F4',  label:'Semifinales',   short:'1/2',  multiplier:6 },
  { id:'3RD', label:'3er Lugar',     short:'3°',   multiplier:6 },
  { id:'F',   label:'Final',         short:'Final',multiplier:8 },
];

// 16 R16 matches, 8 QF, 4 SF, 1 3rd, 1 Final = 30 matches
function buildInitialMatches() {
  const m = [];
  // Cruces reales dieciseisavos de final Mundial 2026
  const r16pairs = [
    ['Sudáfrica','Canadá'],
    ['Brasil','Japón'],
    ['Alemania','Paraguay'],
    ['Países Bajos','Marruecos'],
    ['Costa de Marfil','Noruega'],
    ['Francia','Suecia'],
    ['México','Ecuador'],
    ['Inglaterra','RD del Congo'],
    ['Bélgica','Senegal'],
    ['EE.UU.','Bosnia y Herz.'],
    ['España','Austria'],
    ['Portugal','Croacia'],
    ['Suiza','Argelia'],
    ['Australia','Egipto'],
    ['Argentina','Cabo Verde'],
    ['Colombia','Ghana'],
  ];
  r16pairs.forEach(([ h, a ], i) => {
    m.push({ id:`R16_${i+1}`, round:'R16', slot:i+1, home:h, away:a, homeLabel:h, awayLabel:a });
  });
  // Octavos (QF) — 8 partidos — IDs ya existentes en Google Sheets
  for(let i=1;i<=8;i++) m.push({id:`QF_${i}`,round:'QF',slot:i,home:`G-R16_${i*2-1}`,away:`G-R16_${i*2}`,homeLabel:'Ganador J'+(i*2-1),awayLabel:'Ganador J'+(i*2)});
  // Cuartos (SF) — 4 partidos
  for(let i=1;i<=4;i++) m.push({id:`SF_${i}`,round:'SF',slot:i,home:`G-QF_${i*2-1}`,away:`G-QF_${i*2}`,homeLabel:'Ganador Oct.'+(i*2-1),awayLabel:'Ganador Oct.'+(i*2)});
  // Semifinales (F4) — 2 partidos
  for(let i=1;i<=2;i++) m.push({id:`F4_${i}`,round:'F4',slot:i,home:`G-SF_${i*2-1}`,away:`G-SF_${i*2}`,homeLabel:'Ganador Ctos.'+(i*2-1),awayLabel:'Ganador Ctos.'+(i*2)});
  // 3er lugar y Final
  m.push({id:'3RD_1',round:'3RD',slot:1,home:'P-F4_1',away:'P-F4_2',homeLabel:'Perdedor Semi 1',awayLabel:'Perdedor Semi 2'});
  m.push({id:'F_1',round:'F',slot:1,home:'G-F4_1',away:'G-F4_2',homeLabel:'Ganador Semi 1',awayLabel:'Ganador Semi 2'});
  return m;
}

function labelFor(code) {
  if(code.startsWith('M3')) return `Mejor 3° (${code})`;
  const pos = code[0]==='1'?'1°':'2°';
  return `${pos} Grupo ${code.slice(1)}`;
}

// ── BANDERAS ──────────────────────────────────────────────────
// Banderas como SVG inline — funcionan en cualquier navegador/OS

function flag(name) {
  if(!name) return '';
  const svg = FLAGS[name] || Object.entries(FLAGS).find(([k])=>
    name.toLowerCase()===k.toLowerCase() ||
    name.toLowerCase().includes(k.toLowerCase())
  )?.[1];
  if(!svg) return '';
  const encoded = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  return '<img src="'+encoded+'" width="28" height="19" style="border-radius:2px;vertical-align:middle;margin-right:5px;flex-shrink:0;box-shadow:0 0 1px rgba(0,0,0,0.3)">';
}
function teamLabel(name) {
  if(!name) return name;
  return flag(name) + name;
}

// ── POINTS ────────────────────────────────────────────────────
// Ganador correcto = 1pt × mult; Marcador exacto = 3pt × mult
function getRoundMult(round){ return ROUNDS.find(r=>r.id===round)?.multiplier||1; }

// result puede incluir penaltyWinner: 'home'|'away' si el partido se fue a penales
function getRealWinner(result) {
  if(result.penaltyWinner) return result.penaltyWinner;
  return result.home > result.away ? 'home' : result.home < result.away ? 'away' : 'draw';
}

// Normalize pick value: treat empty string or dash as '0'
function normVal(v) {
  if(v===''||v===undefined||v===null||v==='—'||v==='-') return 0;
  return Number(v);
}

function calcMatchPoints(pick, result, round) {
  if(!pick||!result||result.home===''||result.away==='') return 0;
  const mult = getRoundMult(round);
  const ph=normVal(pick.home), pa=normVal(pick.away);
  const rh=normVal(result.home), ra=normVal(result.away);
  const pickWinner = ph>pa?'home':ph<pa?'away':'draw';
  const resWinner = getRealWinner({...result,home:rh,away:ra});
  // Marcador exacto siempre da 3pts × mult, incluso si hubo penales
  if(ph===rh && pa===ra) return 3*mult;
  // Ganador correcto (incluyendo quién ganó en penales) da 1pt × mult
  if(pickWinner===resWinner) return 1*mult;
  return 0;
}

function calcMatchStatus(pick, result) {
  if(!pick||!result||result.home===''||result.away==='') return null;
  const ph=normVal(pick.home), pa=normVal(pick.away);
  const rh=normVal(result.home), ra=normVal(result.away);
  const pw=ph>pa?'home':ph<pa?'away':'draw';
  const rw=getRealWinner({...result,home:rh,away:ra});
  // Marcador exacto siempre aplica, incluso con penales
  if(ph===rh && pa===ra) return 'exact';
  if(pw===rw) return 'winner';
  return 'miss';
}

// Normalize text: remove accents and lowercase
function normalize(s) {
  return String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}

// Check if a pick matches any of the official values (comma-separated, accent-insensitive)
function awardMatches(pick, official) {
  if(!pick||!official) return false;
  const p = normalize(pick);
  const variants = official.split(',').map(v=>normalize(v)).filter(Boolean);
  return variants.some(v=>v===p||v.includes(p)||p.includes(v));
}

function calcTotalPoints(picks, official, awardPicks, officialAwards) {
  const matchPts = BASE_MATCHES.reduce((s,m)=>{
    const pick=picks[m.id], res=official[m.id];
    if(!pick||res===undefined) return s;
    return s+calcMatchPoints(pick,res,m.round);
  },0);
  const awardPts = AWARDS.reduce((s,a)=>{
    const pick=(awardPicks||{})[a.id], res=(officialAwards||{})[a.id];
    if(!pick||!res) return s;
    return s+(awardMatches(pick,res)?a.pts:0);
  },0);
  return matchPts+awardPts;
}

function calcAwardPoints(awardPicks, officialAwards) {
  return AWARDS.reduce((s,a)=>{
    const pick=(awardPicks||{})[a.id], res=(officialAwards||{})[a.id];
    if(!pick||!res) return s;
    return s+(awardMatches(pick,res)?a.pts:0);
  },0);
}

function maxPossiblePoints() {
  const matchMax = BASE_MATCHES.reduce((s,m)=>s+3*getRoundMult(m.round),0);
  return matchMax + MAX_AWARD_PTS;
}

// ── API ───────────────────────────────────────────────────────
async function api(action, data={}) {
  if(!SCRIPT_URL) return {error:'no_url'};
  try {
    const url = SCRIPT_URL+'?action='+action+'&'+new URLSearchParams(data);
    const r = await fetch(url);
    return await r.json();
  } catch(e){return{error:e.message};}
}
async function apiPost(action, data={}) {
  if(!SCRIPT_URL) return {error:'no_url'};
  try {
    const fd=new FormData();
    fd.append('action',action);
    for(const[k,v] of Object.entries(data)) fd.append(k,typeof v==='object'?JSON.stringify(v):v);
    const r=await fetch(SCRIPT_URL,{method:'POST',body:fd});
    return await r.json();
  } catch(e){return{error:e.message};}
}

async function loadMyPicks(){
  if(!S.playerName) return;
  const r=await api('getPicks',{name:S.playerName});
  if(!r.error){
    S.picks=r.picks||{};
    S.awardPicks=r.awardPicks||{};
    S.locked=r.locked||false;
    S.lockedRounds=r.lockedRounds||{};
    S.lockedAwards=r.lockedAwards||false;
  }
}

function isRoundLocked(round) {
  return (S.locked === true) || (S.lockedRounds && S.lockedRounds[round] === true) || false;
}
async function loadOfficial(){
  const r=await api('getResults');
  if(!r.error){S.official=r.results||{};S.teams=r.teams||{};S.officialAwards=r.officialAwards||{};}
}
async function loadPlayers(){
  const r=await apiWithRetry('getPlayers');
  if(Array.isArray(r)){
    S.players=r;
    document.getElementById('hero-p').textContent=r.length||'—';
    if(S.adminLogged){
      // Fetch sequentially to avoid GAS rate limits
      for(const name of r){
        const d=await apiWithRetry('getPicks',{name});
        S.playerLockData[name]={
          locked:d.locked||false,
          lockedRounds:d.lockedRounds||{},
          lockedAwards:d.lockedAwards||false
        };
      }
    }
  }
}

async function refreshLockData(){
  for(const name of S.players){
    const d=await apiWithRetry('getPicks',{name});
    S.playerLockData[name]={
      locked:d.locked||false,
      lockedRounds:d.lockedRounds||{},
      lockedAwards:d.lockedAwards||false
    };
  }
}

function getGASCode(){
return `const SHEET = 'Fase2';

function doGet(e)  { return handle(e); }
function doPost(e) { return handle(e); }

function handle(e) {
  const p = e.parameter || {};
  let result = {};
  try {
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    let sh = ss.getSheetByName(SHEET);
    if (!sh) sh = ss.insertSheet(SHEET);

    if (p.action === 'savePicks') {
      const row = findOrCreate(sh, p.name);
      // Read lock state BEFORE any writes
      const currentLock   = sh.getRange(row,3).getValue() || 'open';
      const currentRounds = sh.getRange(row,5).getValue() || '{}';
      const rawAwards = sh.getRange(row,6).getValue();
      const currentAwards = (rawAwards===true || rawAwards==='true' || rawAwards==='TRUE') ? 'true' : 'false';
      // Save picks and awards picks only
      sh.getRange(row, 2).setValue(p.picks);
      sh.getRange(row, 4).setValue(p.awardPicks||'{}');
      // Always restore lock state — never let savePicks modify it
      sh.getRange(row,3).setValue(currentLock);
      sh.getRange(row,5).setValue(currentRounds);
      const awardsCell2 = sh.getRange(row,6);
      awardsCell2.setNumberFormat('@');
      awardsCell2.setValue(currentAwards);
      result = { ok: true };

    } else if (p.action === 'getPicks') {
      const row = findRow(sh, p.name);
      if (row) {
        result = {
          picks: JSON.parse(sh.getRange(row,2).getValue()||'{}'),
          locked: sh.getRange(row,3).getValue()==='locked',
          awardPicks: JSON.parse(sh.getRange(row,4).getValue()||'{}'),
          lockedRounds: JSON.parse(sh.getRange(row,5).getValue()||'{}'),
          lockedAwards: (function(v){ return v===true || v==='true' || v==='TRUE'; })(sh.getRange(row,6).getValue())
        };
      } else { result = { picks:{}, locked:false, awardPicks:{}, lockedRounds:{}, lockedAwards:false }; }

    } else if (p.action === 'getPlayers') {
      const last = sh.getLastRow();
      const list = [];
      for (let i=2; i<=last; i++) {
        const n = sh.getRange(i,1).getValue();
        if (n) list.push(n);
      }
      result = list;

    } else if (p.action === 'getResults') {
      let rs = ss.getSheetByName('Resultados2');
      if (!rs) { result = { results:{}, teams:{}, officialAwards:{} }; }
      else {
        const rv = rs.getRange(1,1).getValue();
        const tv = rs.getRange(2,1).getValue();
        const av = rs.getRange(3,1).getValue();
        result = {
          results:        rv ? JSON.parse(rv) : {},
          teams:          tv ? JSON.parse(tv) : {},
          officialAwards: av ? JSON.parse(av) : {}
        };
      }

    } else if (p.action === 'saveResults') {
      let rs = ss.getSheetByName('Resultados2');
      if (!rs) rs = ss.insertSheet('Resultados2');
      rs.getRange(1,1).setValue(p.results);
      rs.getRange(2,1).setValue(p.teams||'{}');
      rs.getRange(3,1).setValue(p.officialAwards||'{}');
      result = { ok: true };

    } else if (p.action === 'setLock') {
      // p.lockData = JSON string: { locked: bool, lockedRounds: {R16:true,...} }
      const row = findOrCreate(sh, p.name);
      const lockData = JSON.parse(p.lockData || '{"locked":false,"lockedRounds":{},"lockedAwards":false}');
      sh.getRange(row,3).setValue(lockData.locked ? 'locked' : 'open');
      sh.getRange(row,5).setValue(JSON.stringify(lockData.lockedRounds || {}));
      // Force column F as plain text so Sheets doesn't auto-convert "true"/"false" into a boolean
      const awardsCell = sh.getRange(row,6);
      awardsCell.setNumberFormat('@');
      awardsCell.setValue(lockData.lockedAwards ? 'true' : 'false');
      result = { ok: true, lockData };
    }
  } catch(err) { result = { error: err.message }; }
  return ContentService.createTextOutput(JSON.stringify(result))
    .setMimeType(ContentService.MimeType.JSON);
}

function findRow(sh, name) {
  const last = sh.getLastRow();
  for (let i=2; i<=last; i++)
    if (sh.getRange(i,1).getValue()===name) return i;
  return null;
}
function findOrCreate(sh, name) {
  const row = findRow(sh, name);
  if (row) return row;
  const next = Math.max(sh.getLastRow()+1, 2);
  sh.getRange(next,1).setValue(name);
  return next;
}`;
}

function renderMatchCard(m){
  const pick = S.picks[m.id]||{home:'',away:''};
  const res  = S.official[m.id];
  const hn   = getTeamName(m.id,'home');
  const an   = getTeamName(m.id,'away');

  const status = calcMatchStatus(pick,res);
  const pts  = status?calcMatchPoints(pick,res,m.round):null;
  const roundLocked = isRoundLocked(m.round);

  let cls='match', badge='';
  if(status==='exact'){cls='match correct';badge=`<div class="match-result-badge exact">⚽ Marcador exacto · +${pts}pts</div>`;}
  else if(status==='winner'){cls='match partial';badge=`<div class="match-result-badge winner-ok">✓ Ganador correcto · +${pts}pts</div>`;}
  else if(status==='miss'){cls='match wrong';badge=`<div class="match-result-badge miss">✗ Sin puntos</div>`;}

  const penInfo = (res&&res.penaltyWinner) ? `<div style="text-align:center;font-size:11px;color:var(--oro-dk);font-weight:600;margin-top:4px">⚽ Definido en penales · Ganó ${esc(res.penaltyWinner==='home'?hn:an)}</div>` : '';

  const phWin=Number(pick.home)>Number(pick.away), paWin=Number(pick.away)>Number(pick.home);
  const disA = roundLocked ? 'disabled' : '';

  return `<div class="${cls}" id="mc-${m.id}">
    <div class="match-hdr">
      <span>J${m.slot} ${roundLocked?'🔒':''}</span>
      <span class="pts-badge">x${mult} · max +${3*mult}pts</span>
    </div>
    <div class="match-body">
      <div class="teams-row">
        <div class="team-name${phWin?' winner':paWin?' loser':''}" title="${esc(hn)}">${teamLabel(hn.length>16?hn.slice(0,15)+'…':hn)}</div>
        <div class="vs">VS</div>
        <div class="team-name${paWin?' winner':phWin?' loser':''}" title="${esc(an)}">${teamLabel(an.length>16?an.slice(0,15)+'…':an)}</div>

        <div class="score-sep">—</div>

async function apiWithRetry(action, data={}, retries=3){
  for(let i=0; i<retries; i++){
    const r = await api(action, data);
    if(!r.error) return r;
    if(i<retries-1) await new Promise(res=>setTimeout(res, 500*(i+1)));
  }
  return {error:'max retries reached'};
}

async function renderRankingAsync(){
  document.getElementById('app').innerHTML='<div class="loading"><div class="spin"></div>Cargando ranking...</div>';

  const pr = await apiWithRetry('getPlayers');
  const or = await apiWithRetry('getResults');
  const players = Array.isArray(pr) ? pr : [];
  const official = (or&&!or.error) ? or.results||{} : {};
  const offAwards = (or&&!or.error) ? or.officialAwards||{} : {};

  const rows = [];
  for(const name of players){
    const d = await apiWithRetry('getPicks', {name});
    if(d.error){
      rows.push({name, pts:0, apts:0, filled:0, afilled:0, locked:false, error:true, roundPts:{}});
      continue;
    }
    const pts    = calcTotalPoints(d.picks||{}, official, d.awardPicks||{}, offAwards);
    const apts   = calcAwardPoints(d.awardPicks||{}, offAwards);
    const filled = BASE_MATCHES.filter(m=>(d.picks||{})[m.id]&&d.picks[m.id].home!==''&&d.picks[m.id].away!=='').length;
    const afilled= AWARDS.filter(a=>(d.awardPicks||{})[a.id]&&d.awardPicks[a.id].trim()).length;
    const roundPts = {};
    ROUNDS.forEach(r=>{
      roundPts[r.id] = BASE_MATCHES
        .filter(m=>m.round===r.id)
        .reduce((s,m)=>s+calcMatchPoints((d.picks||{})[m.id]||{},(official||{})[m.id]||{},r.id),0);
    });
    rows.push({name, pts, apts, filled, afilled, locked:d.locked||false, roundPts});
  }

  rows.sort((a,b)=>b.pts-a.pts||b.filled-a.filled);
  const medals=['🥇','🥈','🥉'];
  const hasRes=Object.keys(official).length>0||Object.keys(offAwards).length>0;

  // Table header columns
  const cols = [
    ...ROUNDS.map(r=>r.short),
    '🏅'
  ];

  document.getElementById('app').innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
    <button class="btn btn-outline btn-sm" onclick="setView('admin')">← Volver al panel</button>
    <div style="display:flex;gap:8px;align-items:center">
      <div style="font-size:12px;color:var(--txt2)">🔒 Solo visible para el administrador</div>
      <button class="btn btn-sm btn-primary" onclick="renderRankingAsync()">↻ Actualizar</button>
    </div>
  </div>
  <div class="card">
    <div class="card-hdr">Clasificación general <small>${rows.length} participantes</small></div>
    ${rows.length===0?'<div class="card-body"><div class="info">Aún no hay participantes.</div></div>':
      rows.map(({name,pts,apts,filled,afilled,locked,error,roundPts},i)=>{
        const rp = roundPts||{};
        return `
      <div class="rank-row${i===0?' gold':''}" style="flex-direction:column;align-items:flex-start;gap:8px">
        <div style="display:flex;align-items:center;width:100%">
          <div class="rmed">${medals[i]||`${i+1}.`}</div>
          <div style="flex:1">
            <div class="rname">${esc(name)} ${locked?'🔒':''} ${error?'⚠️':''}</div>
            <div class="rsub">${filled}/${BASE_MATCHES.length} partidos · ${afilled}/${AWARDS.length} premios</div>
          </div>
          <div><div class="rpts">${pts}</div><div class="rpts-l">puntos</div></div>
        </div>
        <div style="width:100%;overflow-x:auto;padding-bottom:4px">
          <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:360px">
            <thead>
              <tr>
                ${ROUNDS.map(r=>`<th style="background:var(--verde-dk);color:var(--oro);padding:5px 8px;text-align:center;font-family:var(--fd);font-size:13px;letter-spacing:.5px;border-right:1px solid rgba(255,255,255,.1)">${r.short}</th>`).join('')}
                <th style="background:var(--verde-dk);color:var(--oro);padding:5px 8px;text-align:center;font-family:var(--fd);font-size:13px">🏅</th>
                <th style="background:var(--negro);color:var(--oro);padding:5px 8px;text-align:center;font-family:var(--fd);font-size:14px;letter-spacing:.5px">TOTAL</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                ${ROUNDS.map(r=>{
                  const p=rp[r.id]||0;
                  return `<td style="padding:6px 8px;text-align:center;font-weight:${p>0?'700':'400'};color:${p>0?'var(--verde)':'var(--txt2)'};background:${p>0?'var(--verde-lt)':'var(--gris)'};border-right:1px solid var(--borde);border-top:1px solid var(--borde)">${p}<span style="font-size:10px;font-weight:400">pts</span></td>`;
                }).join('')}
                <td style="padding:6px 8px;text-align:center;font-weight:${apts>0?'700':'400'};color:${apts>0?'var(--oro-dk)':'var(--txt2)'};background:${apts>0?'#fffbea':'var(--gris)'};border-right:1px solid var(--borde);border-top:1px solid var(--borde)">${apts}<span style="font-size:10px;font-weight:400">pts</span></td>
                <td style="padding:6px 8px;text-align:center;font-weight:700;font-family:var(--fd);font-size:18px;color:var(--rojo);background:#fff8f8;border-top:1px solid var(--borde)">${pts}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>`;
      }).join('')}
    <div class="footer-note">${hasRes?'Puntos actualizados con resultados reales.':'⏳ Los puntos se actualizan cuando el admin ingresa resultados y premios.'}</div>
  </div>`;
}

function renderVisor(){
  const vName = S.visorPlayer || '';
  const vData = S.visorData || null;

  const selector = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
    <button class="btn btn-outline btn-sm" onclick="setView('admin')">← Volver al panel</button>
    <div style="font-size:12px;color:var(--txt2)">👁️ Solo visible para el administrador</div>
  </div>
  <div class="card" style="margin-bottom:14px">
    <div class="card-hdr">Ver quiniela de participante</div>
    <div class="card-body">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <select id="visor-select" style="flex:1;padding:9px 13px;border:1.5px solid var(--borde);border-radius:var(--r);font-family:var(--fb);font-size:14px;background:var(--gris);color:var(--negro)">
          <option value="">— Selecciona un participante —</option>
          ${S.players.map(p=>`<option value="${esc(p)}" ${p===vName?'selected':''}>${esc(p)}</option>`).join('')}
        </select>
        <button class="btn btn-primary" onclick="loadVisorPlayer(document.getElementById('visor-select').value)">Ver quiniela →</button>
      </div>
    </div>
  </div>`;

  if(!vName || !vData) return selector;

  // Points summary
  const totalPts = calcTotalPoints(vData.picks||{}, S.official, vData.awardPicks||{}, S.officialAwards);
  const hasResults = Object.keys(S.official).length > 0;

  // Build picks display per round
  const roundCards = ROUNDS.map(r => {
    const matches = BASE_MATCHES.filter(m => m.round === r.id);
    const roundLocked = vData.locked || (vData.lockedRounds&&vData.lockedRounds[r.id]) || false;
    const cards = matches.map(m => {
      const pick = (vData.picks||{})[m.id] || {home:'',away:''};
      const res = S.official[m.id];
      const hn = getTeamName(m.id,'home'), an = getTeamName(m.id,'away');
      const status = calcMatchStatus(pick, res);
      const pts = status ? calcMatchPoints(pick, res, m.round) : null;
      const phWin = Number(pick.home) > Number(pick.away);
      const paWin = Number(pick.away) > Number(pick.home);
      let cls = 'match', badge = '';
      if(status==='exact'){cls='match correct';badge=`<div class="match-result-badge exact">⚽ Exacto +${pts}pts</div>`;}
      else if(status==='winner'){cls='match partial';badge=`<div class="match-result-badge winner-ok">✓ Ganador +${pts}pts</div>`;}
      else if(status==='miss'){cls='match wrong';badge=`<div class="match-result-badge miss">✗ Sin puntos</div>`;}
      const penInfo = (res&&res.penaltyWinner) ? `<div style="text-align:center;font-size:10px;color:var(--oro-dk);font-weight:600;margin-top:2px">⚽ Penales · Ganó ${esc(res.penaltyWinner==='home'?hn:an)}</div>` : '';
      return `<div class="${cls}">
        <div class="match-hdr"><span>J${m.slot}</span><span class="pts-badge">x${getRoundMult(r.id)}</span></div>
        <div class="match-body">
          <div class="teams-row">
            <div class="team-name${phWin?' winner':paWin?' loser':''}" style="display:flex;align-items:center;justify-content:center;gap:4px;font-size:13px">${teamLabel(hn)}</div>
            <div class="vs">VS</div>
            <div class="team-name${paWin?' winner':phWin?' loser':''}" style="display:flex;align-items:center;justify-content:center;gap:4px;font-size:13px">${teamLabel(an)}</div>
          </div>
          <div class="score-row" style="margin-top:8px">
            <div style="flex:1;text-align:center;font-family:var(--fd);font-size:28px;color:${phWin?'var(--verde)':paWin?'var(--rojo)':'var(--negro)'}">${pick.home!==''?pick.home:'—'}</div>
            <div class="score-sep">—</div>
            <div style="flex:1;text-align:center;font-family:var(--fd);font-size:28px;color:${paWin?'var(--verde)':phWin?'var(--rojo)':'var(--negro)'}">${pick.away!==''?pick.away:'—'}</div>
          </div>
          ${penInfo}
          ${badge}
        </div>
      </div>`;
    }).join('');

    return `<div class="card" style="margin-bottom:14px">
      <div class="card-hdr">${r.label} ${roundLocked?'🔒':''}<span>x${r.multiplier} · max +${3*r.multiplier}pts por partido</span></div>
      <div class="card-body">
        <div class="matches-grid">${cards}</div>
      </div>
    </div>`;
  }).join('');

  // Awards display
  const awardsLocked = vData.locked || vData.lockedAwards || false;
  const awardsCard = `<div class="card" style="margin-bottom:14px">
    <div class="card-hdr">Premios Individuales ${awardsLocked?'🔒':''}</div>
    <div class="card-body">
      <div class="awards-grid">
        ${AWARDS.map(a=>{
          const pick = (vData.awardPicks||{})[a.id]||'';
          const official = S.officialAwards[a.id]||'';
          const isCorrect = official && pick && awardMatches(pick, official);
          const isWrong = official && pick && !isCorrect;
          return `<div class="award-card${isCorrect?' correct':isWrong?' wrong':''}">
            <div class="award-hdr">
              <div class="award-icon">${a.icon}</div>
              <div><div class="award-title">${a.label}</div><div style="font-size:11px;color:var(--txt2)">${a.desc}</div></div>
              <div style="text-align:right;margin-left:auto"><div class="award-pts">${a.pts}</div><div class="award-pts-lbl">pts</div></div>
            </div>
            <div class="award-body">
              <div style="padding:8px 12px;background:var(--gris);border-radius:var(--r);font-size:14px;font-weight:500;color:${pick?'var(--negro)':'var(--txt2)'}">
                ${pick||'<em>Sin pronóstico</em>'}
              </div>
              ${isCorrect?`<div class="award-result hit">✓ Correcto +${a.pts}pts</div>`:''}
              ${isWrong?`<div class="award-result miss">✗ Fue: ${esc(official)}</div>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;

  return `${selector}
  <div class="card" style="margin-bottom:14px;background:var(--verde-dk)">
    <div style="padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-family:var(--fd);font-size:22px;color:var(--oro)">${esc(vName)}</div>
        <div style="font-size:12px;color:#8eba9e;margin-top:2px">
          ${BASE_MATCHES.filter(m=>(vData.picks||{})[m.id]&&vData.picks[m.id].home!==''&&vData.picks[m.id].away!=='').length}/${BASE_MATCHES.length} partidos ·
          ${AWARDS.filter(a=>(vData.awardPicks||{})[a.id]&&vData.awardPicks[a.id].trim()).length}/${AWARDS.length} premios
          ${vData.locked?'· 🔒 Bloqueado':''}
        </div>
      </div>
      ${hasResults?`<div style="text-align:right"><div style="font-family:var(--fd);font-size:36px;color:var(--oro)">${totalPts}</div><div style="font-size:11px;color:#8eba9e">puntos totales</div></div>`:''}
    </div>
  </div>
  ${roundCards}
  ${awardsCard}`;
}

  render();

        <div id="pen-${m.id}">${isTied?`
        <div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--borde)">
          <div style="font-size:10px;font-weight:600;color:var(--oro-dk);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">⚽ ¿Se fue a penales? Elige quién ganó:</div>
          <div style="display:flex;gap:5px">
            <button class="btn btn-sm ${pen==='home'?'btn-primary':'btn-outline'}" style="flex:1;font-size:11px" onclick="setPenaltyWinner('${m.id}','home')">${esc(hn.length>12?hn.slice(0,11)+'…':hn)} ganó</button>
            <button class="btn btn-sm ${pen==='away'?'btn-primary':'btn-outline'}" style="flex:1;font-size:11px" onclick="setPenaltyWinner('${m.id}','away')">${esc(an.length>12?an.slice(0,11)+'…':an)} ganó</button>
            ${pen?`<button class="btn btn-sm btn-outline" style="font-size:11px" onclick="setPenaltyWinner('${m.id}','')" title="Quitar">✕</button>`:''}
          </div>
        </div>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function setTeam(matchId, side, val){
  S.teams={...S.teams,[matchId]:{...(S.teams[matchId]||{}),[side]:val}};
}
function setOfficialScore(matchId, side, val){
  const prev = S.official[matchId]||{home:'',away:''};
  const updated = {...prev,[side]:val};
  if(updated.home!==updated.away) delete updated.penaltyWinner;
  S.official={...S.official,[matchId]:updated};
  // Only re-render the penalty section of this match, not the whole page
  updatePenaltySection(matchId);
}

function setPenaltyWinner(matchId, side){
  const prev = S.official[matchId]||{home:'',away:''};
  const updated = {...prev};
  if(side===''){ delete updated.penaltyWinner; }
  else { updated.penaltyWinner = side; }
  S.official={...S.official,[matchId]:updated};
  updatePenaltySection(matchId);
}

function updatePenaltySection(matchId){
  // Only update the penalty sub-section without re-rendering the whole page
  const el = document.getElementById('pen-'+matchId);
  if(!el) return;
  const res = S.official[matchId]||{home:'',away:''};
  const m = BASE_MATCHES.find(x=>x.id===matchId);
  if(!m) return;
  const hn = getTeamName(matchId,'home'), an = getTeamName(matchId,'away');
  const isTied = res.home!==''&&res.away!==''&&Number(res.home)===Number(res.away);
  const pen = res.penaltyWinner||'';
  el.innerHTML = isTied ? `
    <div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--borde)">
      <div style="font-size:10px;font-weight:600;color:var(--oro-dk);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">⚽ ¿Se fue a penales? Elige quién ganó:</div>
      <div style="display:flex;gap:5px">
        <button class="btn btn-sm ${pen==='home'?'btn-primary':'btn-outline'}" style="flex:1;font-size:11px" onclick="setPenaltyWinner('${matchId}','home')">${esc(hn.length>12?hn.slice(0,11)+'…':hn)} ganó</button>
        <button class="btn btn-sm ${pen==='away'?'btn-primary':'btn-outline'}" style="flex:1;font-size:11px" onclick="setPenaltyWinner('${matchId}','away')">${esc(an.length>12?an.slice(0,11)+'…':an)} ganó</button>
        ${pen?`<button class="btn btn-sm btn-outline" style="font-size:11px" onclick="setPenaltyWinner('${matchId}','')" title="Quitar">✕</button>`:''}
      </div>
    </div>` : '';
}

async function adminSaveTeams(){
  const r=await apiPost('saveResults',{results:JSON.stringify(S.official),teams:JSON.stringify(S.teams),officialAwards:JSON.stringify(S.officialAwards)});
  if(r&&r.ok) toast('Equipos guardados ✓');
  else toast(r?.error||'Error',true);
}
async function adminSaveResults(){
  const r=await apiPost('saveResults',{results:JSON.stringify(S.official),teams:JSON.stringify(S.teams),officialAwards:JSON.stringify(S.officialAwards)});
  if(r&&r.ok) toast('Resultados y premios guardados ✓');
  else toast(r?.error||'Error',true);
}
async function adminSetLock(idx, newLockData){
  const name = S.players[idx];
  if(!name) return;
  // Optimistic update first
  if(!S.playerLockData[name]) S.playerLockData[name]={locked:false,lockedRounds:{},lockedAwards:false};
  S.playerLockData[name] = {...newLockData};
  if(name===S.playerName){S.locked=newLockData.locked;S.lockedRounds=newLockData.lockedRounds||{};S.lockedAwards=newLockData.lockedAwards||false;}
  renderAdminLockTable();
  // Then persist to server
  const r=await apiPost('setLock',{name, lockData:JSON.stringify(newLockData)});
  if(r&&r.error){
    toast('Error al guardar: '+r.error, true);
    await refreshLockData();
    renderAdminLockTable();
    return;
  }
  // Verify it actually persisted by re-reading from server
  const verify = await api('getPicks',{name});
  if(!verify.error){
    const persisted = {
      locked: verify.locked||false,
      lockedRounds: verify.lockedRounds||{},
      lockedAwards: verify.lockedAwards||false
    };
    S.playerLockData[name] = persisted;
    if(name===S.playerName){S.locked=persisted.locked;S.lockedRounds=persisted.lockedRounds;S.lockedAwards=persisted.lockedAwards;}
    // Check if what we wanted matches what got saved
    const matches = persisted.locked===newLockData.locked && persisted.lockedAwards===newLockData.lockedAwards;
    if(!matches){
      toast(`⚠️ ${name}: el cambio no se guardó correctamente, intenta de nuevo`, true);
    } else {
      toast(`${name} actualizado ✓`);
    }
    renderAdminLockTable();
  } else {
    toast(`${name} actualizado ✓`);
  }
}

function adminToggleLock(idx){
  const name = S.players[idx];
  if(!name) return;
  const ld = S.playerLockData[name]||{locked:false,lockedRounds:{},lockedAwards:false};
  const newLocked = !ld.locked;
  adminSetLock(idx, {
    locked: newLocked,
    lockedRounds: newLocked ? ld.lockedRounds : {},
    lockedAwards: newLocked ? ld.lockedAwards : false
  });
}

function adminToggleRoundLock(idx, round){
  const name = S.players[idx];
  if(!name) return;
  const ld = S.playerLockData[name]||{locked:false,lockedRounds:{},lockedAwards:false};
  const newLockedRounds = {...(ld.lockedRounds||{})};
  if(newLockedRounds[round]) delete newLockedRounds[round];
  else newLockedRounds[round] = true;
  adminSetLock(idx, {locked:ld.locked, lockedRounds:newLockedRounds, lockedAwards:ld.lockedAwards||false});
}

function adminToggleAwardsLock(idx){
  const name = S.players[idx];
  if(!name) return;
  const ld = S.playerLockData[name]||{locked:false,lockedRounds:{},lockedAwards:false};
  adminSetLock(idx, {locked:ld.locked, lockedRounds:ld.lockedRounds||{}, lockedAwards:!(ld.lockedAwards||false)});
}

function renderAdminLockTable(){
  const tbody = document.getElementById('lock-tbody');
  if(!tbody) return;
  tbody.innerHTML = S.players.map((name,idx)=>{
    const ld = S.playerLockData[name]||{locked:false,lockedRounds:{},lockedAwards:false};
    const awardsLocked = ld.locked || ld.lockedAwards || false;
    return `<tr>
      <td style="font-weight:500;white-space:nowrap;padding:8px 12px">${esc(name)}</td>
      ${ROUNDS.map(r=>{
        const isLocked = ld.locked || (ld.lockedRounds&&ld.lockedRounds[r.id]) || false;
        return `<td style="text-align:center;padding:4px">
          <button class="btn btn-sm ${isLocked?'btn-danger':'btn-outline'}"
            onclick="adminToggleRoundLock(${idx},'${r.id}')"
            title="${isLocked?'Desbloquear':'Bloquear'} ${r.label}"
            style="min-width:38px">
            ${isLocked?'🔒':'🔓'}
          </button>
        </td>`;
      }).join('')}
      <td style="text-align:center;padding:4px">
        <button class="btn btn-sm ${awardsLocked?'btn-danger':'btn-outline'}"
          onclick="adminToggleAwardsLock(${idx})"
          title="${awardsLocked?'Desbloquear premios':'Bloquear premios'}"
          style="min-width:38px;${!awardsLocked?'border-color:#b39700;color:#b39700':''}">
          ${awardsLocked?'🔒':'🏅'}
        </button>
      </td>
      <td style="text-align:center;padding:4px">
        <button class="btn btn-sm ${ld.locked?'btn-danger':'btn-primary'}"
          onclick="adminToggleLock(${idx})"
          title="${ld.locked?'Desbloquear todo':'Bloquear todo'}"
          style="min-width:56px">
          ${ld.locked?'🔒 Todo':'🔓 Todo'}
        </button>
      </td>
    </tr>`;
  }).join('');
}
function adminLogin(){
  const p=document.getElementById('adm-p').value;
  if(p===ADMIN_PASS){S.adminLogged=true;S.adminPass=p;loadPlayers().then(()=>render());}
  else document.getElementById('adm-err').innerHTML='<div class="err">Contraseña incorrecta.</div>';
}

// ── INIT ──────────────────────────────────────────────────────
async function init(){
  const max=maxPossiblePoints();
  document.getElementById('hero-pts').textContent=max;
  if(!SCRIPT_URL){render();return;}
  await Promise.all([loadOfficial(),loadPlayers()]);
  if(S.playerName) await loadMyPicks();
  render();
}

init();
</script>
